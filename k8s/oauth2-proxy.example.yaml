apiVersion: v1
kind: Service
metadata:
  labels:
    k8s-app: oauth2-proxy-nexus
  name: oauth2-proxy-nexus
  namespace: default
spec:
  ports:
  - name: http
    port: 4180
    protocol: TCP
    targetPort: 4180
  selector:
    k8s-app: oauth2-proxy-nexus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k8s-app: oauth2-proxy-nexus
  name: oauth2-proxy-nexus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: oauth2-proxy-nexus
  template:
    metadata:
      labels:
        k8s-app: oauth2-proxy-nexus
    spec:
      containers:
      - args:
        - --http-address=0.0.0.0:4180
        - --provider=oidc
        - --provider-display-name="Authentik"
        - --client-id=YOUR_AUTHENTIK_CLIENT_ID
        - --client-secret=YOUR_AUTHENTIK_CLIENT_SECRET
        - --redirect-url=https://oncall.frai.pro/oauth2/callback
        - --oidc-issuer-url=https://authentik.frai.pro/application/o/oncall/
        - --cookie-secure=true
        - --cookie-secret=YOUR_COOKIE_SECRET_32_CHARS_BASE64
        - --email-domain=*
        - --silence-ping-logging=true
        - --ssl-insecure-skip-verify=true
        - --upstream=http://nexus-nginx:80
        - --skip-provider-button=true
        - --pass-authorization-header=true
        - --pass-access-token=true
        - --set-authorization-header=true
        - --pass-host-header=true
        - --set-xauthrequest=true
        - --prefer-email-to-user=true
        image: quay.io/oauth2-proxy/oauth2-proxy:latest
        imagePullPolicy: Always
        name: oauth2-proxy-nexus
        ports:
        - containerPort: 4180
          protocol: TCP
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
