apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
type: Opaque
stringData:
  anthropic-api-key: "sk-ant-api03-YOUR_KEY_HERE"
  postgres-url: "postgresql://user:password@host:5432/database?sslmode=require"
  pagerduty-api-key: "YOUR_PAGERDUTY_API_KEY"  # Optional
  pagerduty-user-email: "your-email@domain.com"  # Optional
