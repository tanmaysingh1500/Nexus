apiVersion: v1
kind: Service
metadata:
  name: nexus-nginx
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Endpoints
metadata:
  name: nexus-nginx
  namespace: default
subsets:
- addresses:
  - ip: 37.27.115.235
  ports:
  - port: 3000
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - oncall.frai.pro
    secretName: nexus-oncall-tls
  rules:
  - host: oncall.frai.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oauth2-proxy-nexus
            port:
              number: 4180
