# Nexus Alertmanager Configuration
global:
  resolve_timeout: 5m
  # Slack webhook URL (configure via environment variable)
  # slack_api_url: 'https://hooks.slack.com/services/xxx'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    # Configure webhook or other receivers as needed
    # webhook_configs:
    #   - url: 'http://backend:8000/api/v1/alerts/prometheus'
    #     send_resolved: true

  - name: 'critical-receiver'
    # webhook_configs:
    #   - url: 'http://backend:8000/api/v1/alerts/prometheus'
    #     send_resolved: true
    # pagerduty_configs:
    #   - service_key: '<pagerduty-service-key>'
    #     severity: critical

  - name: 'warning-receiver'
    # webhook_configs:
    #   - url: 'http://backend:8000/api/v1/alerts/prometheus'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
